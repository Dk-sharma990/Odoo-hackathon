<header class="view-header flex-between">
    <button class="btn-back" onclick="navigateTo('dashboard')"><i class="fa-solid fa-arrow-left"></i></button>
    <h1 id="search-results-title">Search Results</h1>
</header>
<div class="results-layout">
    <div class="filters-panel glass-panel">
        <h3>Filters</h3>
        <div class="filter-group">
            <label>Price Range</label>
            <input type="range" min="0" max="1000" value="500">
        </div>
        <div class="filter-group">
            <label>Star Rating</label>
            <div><input type="checkbox"> 5 Stars</div>
            <div><input type="checkbox"> 4 Stars</div>
            <div><input type="checkbox"> 3 Stars</div>
        </div>
    </div>
    <div class="results-panel" id="results-container">
        <!-- Dynamic Results Injected Here -->
    </div>
</div>
