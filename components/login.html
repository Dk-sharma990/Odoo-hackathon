<div class="auth-container glass-panel">
    <div class="auth-header">
        <h2><i class="fa-solid fa-earth-americas"></i> Traveloop</h2>
        <p id="auth-subtitle">Plan, budget, and share your dream trips.</p>
    </div>
    <form id="auth-form">
        <div class="input-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com" required>
        </div>
        <div class="input-group" id="password-group">
            <div class="flex-between">
                <label for="auth-password" id="auth-password-label">Password</label>
            </div>
            <input type="password" id="auth-password" placeholder="••••••••" required>
            <a href="#" id="forgot-password-link" style="color: #38bdf8; font-size: 0.85rem; margin-top: 0.5rem; text-decoration: none; align-self: flex-start;">Forgot Password?</a>
        </div>
        <div class="input-group" id="name-group" style="display:none;">
            <label for="auth-name">Full Name</label>
            <input type="text" id="auth-name" placeholder="John Doe">
        </div>
        <button type="submit" class="btn-primary" id="auth-submit-btn">Login</button>
    </form>
    <p class="auth-switch" id="auth-switch-container">Don't have an account? <span id="switch-auth-mode" style="color: #38bdf8; font-weight: 600; cursor: pointer;">Sign up</span></p>
    <p class="auth-switch" id="back-to-login-container" style="display:none;"><span id="back-to-login" style="color: #38bdf8; font-weight: 600; cursor: pointer;"><i class="fa-solid fa-arrow-left"></i> Back to Login</span></p>
</div>
